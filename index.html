      pointer-events:none;

      z-index:-1;

    @keyframes float{to{transform:translate(14vw,-8vh) rotate(28deg) scale(1.05)}}

      max-width:520px;
      margin:0 auto;
      padding:16px 14px calc(92px + var(--safe-bottom));
    }

      backdrop-filter:blur(22px);
    }
