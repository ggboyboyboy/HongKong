<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#07111f" />
  <meta name="color-scheme" content="dark light" />
  <title>香港一日游执行助手｜2026-05-02</title>
  <style>
    :root{
      --bg:#07111f;
      --bg2:#050910;
      --panel:rgba(255,255,255,.078);
      --panel2:rgba(255,255,255,.12);
      --card:rgba(255,255,255,.092);
      --line:rgba(255,255,255,.14);
      --txt:#eef7ff;
      --sub:rgba(238,247,255,.73);
      --muted:rgba(238,247,255,.50);
      --mint:#7fffd4;
      --cyan:#75d7ff;
      --violet:#b69cff;
      --pink:#ff8cc8;
      --amber:#ffd166;
      --red:#ff647c;
      --green:#7ce38b;
      --blue:#8fb8ff;
      --shadow:0 24px 70px rgba(0,0,0,.45);
      --radius:28px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-top: env(safe-area-inset-top, 0px);
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang SC","Microsoft YaHei",Arial,sans-serif;
      background:
        radial-gradient(920px 700px at 88% -8%, rgba(117,215,255,.25), transparent 62%),
        radial-gradient(820px 620px at -16% 6%, rgba(255,140,200,.20), transparent 58%),
        linear-gradient(180deg,#06101e 0%,#0b1222 38%,#050910 100%);
      color:var(--txt);
      min-height:100vh;
      overflow-x:hidden;
    }

    body.light{
      --bg:#f7fbff;
      --bg2:#eff5fb;
      --panel:rgba(255,255,255,.78);
      --panel2:rgba(255,255,255,.96);
      --card:rgba(255,255,255,.88);
      --line:rgba(20,39,62,.12);
      --txt:#0f1724;
      --sub:rgba(15,23,36,.74);
      --muted:rgba(15,23,36,.52);
      --shadow:0 24px 70px rgba(31,76,115,.15);
      background:
        radial-gradient(920px 700px at 88% -8%, rgba(117,215,255,.30), transparent 62%),
        radial-gradient(820px 620px at -16% 6%, rgba(255,140,200,.20), transparent 58%),
        linear-gradient(180deg,#f7fbff 0%,#eff5fb 100%);
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background-image:
        linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px),
        linear-gradient(90deg,rgba(255,255,255,.035) 1px, transparent 1px);
      background-size:36px 36px;
      mask-image:linear-gradient(to bottom,rgba(0,0,0,.9),transparent 72%);
      z-index:-2;
    }
    body.light::before{
      background-image:
        linear-gradient(rgba(15,23,36,.035) 1px, transparent 1px),
        linear-gradient(90deg,rgba(15,23,36,.035) 1px, transparent 1px);
    }

    .aurora{
      position:fixed;
      inset:auto auto -28vh -22vw;
      width:86vw;height:86vw;
      background:conic-gradient(from 130deg,rgba(127,255,212,.20),rgba(117,215,255,.16),rgba(182,156,255,.18),rgba(255,140,200,.12),rgba(127,255,212,.20));
      filter:blur(42px);
      border-radius:50%;
      opacity:.75;
      pointer-events:none;
      animation:float 14s ease-in-out infinite alternate;
      z-index:-1;
    }
    @keyframes float{to{transform:translate(14vw,-8vh) rotate(28deg) scale(1.05)}}

    .app{
      width:100%;
      max-width:540px;
      margin:0 auto;
      padding:calc(12px + var(--safe-top)) 14px calc(98px + var(--safe-bottom));
    }

    .topbar{
      display:flex;
      gap:10px;
      justify-content:space-between;
      align-items:center;
      margin:0 0 12px;
    }
    .brand{
      display:flex;
      align-items:center;
      gap:9px;
      min-width:0;
    }
    .logo{
      width:40px;height:40px;
      border-radius:16px;
      display:grid;
      place-items:center;
      background:linear-gradient(145deg,rgba(127,255,212,.24),rgba(117,215,255,.08));
      border:1px solid rgba(255,255,255,.16);
      box-shadow:0 10px 28px rgba(0,0,0,.2);
      flex:0 0 auto;
    }
    .brand small{
      display:block;
      color:var(--muted);
      font-size:11px;
      line-height:1.2;
    }
    .brand b{
      display:block;
      font-size:15px;
      letter-spacing:-.03em;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .icon-btn{
      border:1px solid var(--line);
      background:var(--panel);
      color:var(--txt);
      min-width:44px;
      min-height:44px;
      border-radius:17px;
      font:inherit;
      display:grid;
      place-items:center;
      cursor:pointer;
      backdrop-filter:blur(16px);
    }

    .hero{
      position:relative;
      min-height:296px;
      border:1px solid var(--line);
      border-radius:34px;
      overflow:hidden;
      box-shadow:var(--shadow);
      padding:20px;
      background:
        linear-gradient(145deg,rgba(255,255,255,.16),rgba(255,255,255,.045)),
        radial-gradient(420px 280px at 85% 18%,rgba(127,255,212,.30),transparent 62%),
        radial-gradient(400px 250px at 15% 28%,rgba(255,140,200,.23),transparent 60%);
      backdrop-filter:blur(22px);
    }

    .hero::after{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(115deg,transparent 0 34%,rgba(255,255,255,.10) 35%,transparent 42% 100%);
      transform:translateX(-45%);
      opacity:.55;
      pointer-events:none;
    }

    .tag{
      display:inline-flex;
      gap:8px;
      align-items:center;
      border:1px solid rgba(127,255,212,.34);
      background:rgba(127,255,212,.10);
      color:#dffdf3;
      border-radius:999px;
      padding:7px 11px;
      font-size:12px;
      letter-spacing:.04em;
    }
    body.light .tag{color:#0a6250;background:rgba(127,255,212,.28)}

    h1{
      margin:18px 0 8px;
      font-size:34px;
      line-height:1.04;
      letter-spacing:-.065em;
      font-weight:900;
    }
    .lead{
      margin:0;
      max-width:25em;
      color:var(--sub);
      font-size:14px;
      line-height:1.7;
    }

    .hero-actions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:18px;
      position:relative;
      z-index:1;
    }
    .primary-action,.ghost-action{
      min-height:48px;
      border-radius:18px;
      border:1px solid rgba(255,255,255,.16);
      display:grid;
      place-items:center;
      text-decoration:none;
      font-size:13px;
      font-weight:800;
      color:var(--txt);
      background:rgba(255,255,255,.10);
      backdrop-filter:blur(16px);
    }
    .primary-action{
      background:linear-gradient(135deg,rgba(127,255,212,.35),rgba(117,215,255,.18));
      color:#eafff8;
      border-color:rgba(127,255,212,.34);
    }
    body.light .primary-action{color:#06392f}

    .chips{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:14px;
      position:relative;
      z-index:1;
    }
    .chip{
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.09);
      border-radius:22px;
      padding:12px;
      min-height:78px;
    }
    body.light .chip{background:rgba(255,255,255,.72)}
    .chip b{
      display:block;
      font-size:23px;
      letter-spacing:-.045em;
      line-height:1.05;
    }
    .chip span{
      display:block;
      margin-top:6px;
      font-size:12px;
      color:var(--muted);
    }
    .chip.hot{background:linear-gradient(145deg,rgba(255,209,102,.18),rgba(255,255,255,.065));border-color:rgba(255,209,102,.30)}
    .chip.danger{background:linear-gradient(145deg,rgba(255,100,124,.18),rgba(255,255,255,.065));border-color:rgba(255,100,124,.30)}

    .status-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:14px;
    }
    .status-card{
      border:1px solid var(--line);
      border-radius:24px;
      background:var(--panel);
      backdrop-filter:blur(18px);
      padding:14px;
      box-shadow:0 14px 40px rgba(0,0,0,.18);
      min-height:108px;
    }
    .status-card b{
      display:block;
      font-size:12px;
      color:var(--muted);
      margin-bottom:8px;
    }
    .status-card .big{
      font-size:26px;
      font-weight:900;
      letter-spacing:-.06em;
      line-height:1;
    }
    .status-card .hint{
      margin-top:8px;
      color:var(--sub);
      font-size:12px;
      line-height:1.45;
    }
    .status-card.red{
      border-color:rgba(255,100,124,.28);
      background:linear-gradient(145deg,rgba(255,100,124,.18),var(--panel));
    }
    .status-card.amber{
      border-color:rgba(255,209,102,.28);
      background:linear-gradient(145deg,rgba(255,209,102,.15),var(--panel));
    }

    .now-card{
      margin-top:14px;
      border:1px solid var(--line);
      border-radius:28px;
      background:linear-gradient(145deg,rgba(117,215,255,.15),rgba(255,255,255,.07));
      padding:16px;
      box-shadow:0 16px 42px rgba(0,0,0,.18);
      backdrop-filter:blur(18px);
    }
    .now-card .label{
      color:var(--muted);
      font-size:12px;
      margin-bottom:7px;
    }
    .now-card h2{
      margin:0 0 8px;
      font-size:22px;
      letter-spacing:-.055em;
    }
    .now-card p{
      margin:0;
      color:var(--sub);
      font-size:13px;
      line-height:1.6;
    }
    .progress-wrap{
      margin-top:12px;
      height:8px;
      background:rgba(255,255,255,.09);
      border-radius:999px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.08);
    }
    .progress-bar{
      height:100%;
      width:0;
      background:linear-gradient(90deg,var(--mint),var(--cyan),var(--violet),var(--pink));
      border-radius:999px;
      transition:width .6s ease;
    }

    .section{
      margin-top:18px;
      border:1px solid var(--line);
      border-radius:var(--radius);
      background:var(--panel);
      box-shadow:0 12px 40px rgba(0,0,0,.22);
      backdrop-filter:blur(22px);
      overflow:hidden;
    }

    .section-head{
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:12px;
      padding:18px 18px 12px;
      border-bottom:1px solid rgba(255,255,255,.08);
    }
    .section h2{
      margin:0;
      font-size:20px;
      letter-spacing:-.04em;
    }
    .mini{
      color:var(--muted);
      font-size:12px;
      line-height:1.5;
      text-align:right;
      flex:0 0 auto;
    }

    .route{
      padding:14px 16px 18px;
    }
    .mapline{
      position:relative;
      display:flex;
      gap:8px;
      align-items:center;
      justify-content:space-between;
      min-height:68px;
      padding:8px 2px 2px;
    }
    .mapline::before{
      content:"";
      position:absolute;
      top:28px;
      left:28px;
      right:28px;
      height:2px;
      background:linear-gradient(90deg,var(--cyan),var(--violet),var(--pink),var(--amber));
      opacity:.8;
    }
    .stop{
      position:relative;
      z-index:1;
      width:58px;
      text-align:center;
    }
    .dot{
      width:40px;height:40px;
      margin:0 auto 7px;
      border-radius:16px;
      display:grid;
      place-items:center;
      border:1px solid rgba(255,255,255,.22);
      background:linear-gradient(145deg,rgba(255,255,255,.22),rgba(255,255,255,.08));
      box-shadow:0 10px 30px rgba(0,0,0,.28);
      font-size:17px;
    }
    body.light .dot{box-shadow:0 10px 30px rgba(43,82,120,.13)}
    .stop span{
      display:block;
      color:var(--sub);
      font-size:10px;
      line-height:1.2;
    }

    .notice{
      margin-top:14px;
      border:1px solid rgba(255,209,102,.25);
      background:linear-gradient(145deg,rgba(255,209,102,.14),rgba(255,255,255,.055));
      border-radius:24px;
      padding:14px;
      color:#fff3c8;
      font-size:13px;
      line-height:1.65;
    }
    body.light .notice{color:#684b00;background:rgba(255,209,102,.20)}

    .timeline{
      position:relative;
      padding:4px 14px 16px;
    }
    .item{
      position:relative;
      display:grid;
      grid-template-columns:72px 1fr;
      gap:12px;
      padding:14px 0;
      border-bottom:1px solid rgba(255,255,255,.075);
      border-radius:18px;
      transition:background .25s ease, border-color .25s ease, transform .25s ease;
    }
    .item:last-child{border-bottom:0}
    .item.active{
      background:linear-gradient(145deg,rgba(127,255,212,.18),rgba(117,215,255,.08));
      border:1px solid rgba(127,255,212,.28);
      padding:14px 10px;
      margin:6px -4px;
      transform:translateY(-1px);
      box-shadow:0 14px 40px rgba(0,0,0,.18);
    }
    .item.past{opacity:.62}
    .time{
      color:#d8ecff;
      font-weight:900;
      font-size:13px;
      line-height:1.2;
      letter-spacing:-.02em;
    }
    body.light .time{color:#1f4a6c}
    .item h3{
      margin:0 0 6px;
      font-size:16px;
      letter-spacing:-.03em;
    }
    .item p{
      margin:0;
      color:var(--sub);
      font-size:13
